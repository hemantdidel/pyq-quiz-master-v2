<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Result</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;

}

.card{

padding:20px;
border-radius:10px;
background:#fafafa;
text-align:center;
border:1px solid #ddd;

}

.card h2{

margin:0;
font-size:32px;

}

.card p{

margin-top:10px;

}

.progress{

margin:30px 0;
height:25px;
background:#ddd;
border-radius:30px;
overflow:hidden;

}

.progressFill{

height:100%;
width:0%;
background:#4caf50;
transition:.5s;

}

.buttons{

display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;

}

button{

padding:12px 25px;
border:none;
cursor:pointer;
border-radius:8px;
font-size:16px;

}

.review{

background:#2196f3;
color:white;

}

.retry{

background:#4caf50;
color:white;

}

.home{

background:#444;
color:white;

}

</style>

</head>

<body>

<div class="container">

<h1>Quiz Result</h1>

<div class="grid">

<div class="card">

<h2 id="score">0</h2>

<p>Score</p>

</div>

<div class="card">

<h2 id="correct">0</h2>

<p>Correct</p>

</div>

<div class="card">

<h2 id="wrong">0</h2>

<p>Wrong</p>

</div>

<div class="card">

<h2 id="unattempted">0</h2>

<p>Unattempted</p>

</div>

<div class="card">

<h2 id="percentage">0%</h2>

<p>Percentage</p>

</div>

</div>

<div class="progress">

<div class="progressFill" id="progressFill"></div>

</div>

<div class="buttons">

<button class="review" id="reviewBtn">

Review Answers

</button>

<button class="retry" id="retryBtn">

Try Again

</button>

<button class="home" id="homeBtn">

Home

</button>

</div>

</div>

<script src="result.js"></script>

</body>

</html>
