<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Review Answers</title>

<link rel="stylesheet" href="style.css">

<style>

body{

margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#f5f5f5;

}

.container{

max-width:1000px;
margin:auto;

}

.reviewCard{

background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.option{

padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;

}

.correct{

background:#d4edda;
border-color:#28a745;

}

.wrong{

background:#f8d7da;
border-color:#dc3545;

}

.status{

display:inline-block;
padding:5px 12px;
border-radius:20px;
font-size:13px;
margin-bottom:10px;

}

.status.correctStatus{

background:#28a745;
color:#fff;

}

.status.wrongStatus{

background:#dc3545;
color:#fff;

}

.status.skipStatus{

background:#999;
color:#fff;

}

button{

padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h1>Answer Review</h1>

<div id="reviewContainer"></div>

<button onclick="window.location.href='result.html'">

Back to Result

</button>

</div>

<script src="review.js"></script>

</body>

</html>
